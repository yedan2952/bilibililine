name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install Android SDK components
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" "build-tools;33.0.0"

      - name: Build APKs
        run: |
          chmod +x gradlew
          ./gradlew assembleArm8Debug assembleArm7Debug

      - name: Upload arm8 APK
        uses: actions/upload-artifact@v4
        with:
          name: bilibilite-arm8-debug
          path: app/build/outputs/apk/arm8/debug/*.apk

      - name: Upload arm7 APK
        uses: actions/upload-artifact@v4
        with:
          name: bilibilite-arm7-debug
          path: app/build/outputs/apk/arm7/debug/*.apk
